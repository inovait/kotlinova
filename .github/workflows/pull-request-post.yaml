# For safety reasons, pull request jobs have no permissions for the project, so they cannot post comments etc.
# Thus, pull requests jobs just upload their data and afterwards, this job runs to post comments etc. to the PR

name: "pull-request-post"
on:
  workflow_run:
    workflows: [ "pull-request-build" ]
    types: [ completed ]

permissions:
  pull-requests: write
  checks: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3.0.1'
      - name: 'Save Service account'
        run: 'echo "${{ secrets.TEST_GCLOUD_ACCOUNT }}" | base64 -d > test-lab-key.json'

      - name: Download and Extract Artifacts
        uses: dawidd6/action-download-artifact@9dde25e7413c6123b6062d4c9fc954d6ff005cfc
        continue-on-error: true
        id: download
        with:
          run_id: ${{ github.event.workflow_run.id }}
          path: artifacts
          allow_forks: true
          search_artifacts: true
      - name: Set the PR_NUM
        if: steps.download.outcome == 'success'
        id: pr-meta
        run: |
          pr=$(cat artifacts/results/kotlinova/kotlinova/pr_number.txt)
          echo "pr_num=$pr" > $GITHUB_OUTPUT
          echo "pr_ref=refs/pull/$pr/merge" >> $GITHUB_OUTPUT
          mkdir -p repo
      - uses: actions/checkout@v6
        if: steps.download.outcome == 'success'
        with:
          lfs: true
          submodules: recursive
          ref: ${{ steps.pr-meta.outputs.pr_ref }}
          fetch-depth: 0
          path: repo
          persist-credentials: false
      - name: Set git ref
        if: steps.download.outcome == 'success'
        id: git-hash
        run:
          ref=$(git rev-parse HEAD);echo "git_hash=$ref" > $GITHUB_OUTPUT
        working-directory: repo
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407
        with:
          packages: 'tools platform-tools build-tools;36.1.0'

      - name: "Run instrumented tests on Firebase test lab"
        if: steps.download.outcome == 'success' && hashFiles('artifacts/results/kotlinova/kotlinova/navigation/tests/build/outputs/apk/androidTest/debug/tests-debug-androidTest.apk') != ''
        run: |
          tree artifacts/results/kotlinova/kotlinova/navigation
          md5sum artifacts/results/kotlinova/kotlinova/navigation/tests/build/outputs/apk/debug/tests-debug.apk
          md5sum artifacts/results/kotlinova/kotlinova/navigation/tests/build/outputs/apk/androidTest/debug/tests-debug-androidTest.apk
          $ANDROID_HOME/build-tools/36.1.0/apksigner verify --verbose --print-certs artifacts/results/kotlinova/kotlinova/navigation/tests/build/outputs/apk/debug/tests-debug.apk
          $ANDROID_HOME/build-tools/36.1.0/apksigner verify --verbose --print-certs artifacts/results/kotlinova/kotlinova/navigation/tests/build/outputs/apk/androidTest/debug/tests-debug-androidTest.apk
        
          gcloud auth login --cred-file=test-lab-key.json
          gcloud config set project androidarchitectureplayground
          
          tmp_file=$(mktemp)
          gcloud firebase test android run \
          --type instrumentation \
          --app artifacts/results/kotlinova/kotlinova/navigation/tests/build/outputs/apk/debug/tests-debug.apk \
          --test artifacts/results/kotlinova/kotlinova/navigation/tests/build/outputs/apk/androidTest/debug/tests-debug-androidTest.apk \
          --device model=MediumPhone.arm,version=26 \
          --use-orchestrator \
          --environment-variables clearPackageData=true,coverage=true,coverageFilePath=/sdcard/Download/ \
          --directories-to-pull /sdcard/Download \
          |& tee tmp_file
          
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          RESULTS=$(cat "$tmp_file")
          rm "$tmp_file"
          
          BUCKET=$(echo $RESULTS | grep -oP "browser/\K[^]]+")
          mkdir -p repo/instrumented_tests_results
          gcloud storage cp -r gs://$BUCKET repo/instrumented_tests_results/
          
          if [[ TEST_EXIT_CODE -ne 0 ]] then
            exit 1
          fi
      - name: Post SARIF findings as comments in the pull request
        if: always() && steps.download.outcome == 'success' && hashFiles('artifacts/results/kotlinova/kotlinova/merge.sarif') != ''
        uses: sett-and-hive/sarif-to-comment-action/composite@d6808eaef0d23c26905ca02ea3dd44e1e22c1dae
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          branch: "${{ steps.git-hash.outputs.git_hash }}"
          pr-number: "${{ steps.pr-meta.outputs.pr_num }}"
          title: Lint report
          show-rule-details: false
          sarif-file: 'artifacts/results/kotlinova/kotlinova/merge.sarif'
          simple: true
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action/linux@27d65e188ec43221b20d26de30f4892fad91df2f
        if: always() && steps.download.outcome == 'success'
        with:
          comment_mode: failures
          files: |
            artifacts/**/TEST-*.xml
            repo/instrumented_tests_results/**/*.xml
          commit: ${{ github.event.workflow_run.head_sha }}
          event_file: artifacts/results/_temp/_github_workflow/event.json
          event_name: ${{ github.event.workflow_run.event }}
          check_run: 'true'

      # Compile the project if jacoco test exec is present, to generate classes for jacoco report
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5
        if: always() && steps.download.outcome == 'success' && hashFiles('artifacts/results/kotlinova/kotlinova/core/build/jacoco/jvmTest.exec') != ''
        with:
          java-version: '21'
          distribution: temurin
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407
        if: always() && steps.download.outcome == 'success' && hashFiles('artifacts/results/kotlinova/kotlinova/core/build/jacoco/jvmTest.exec') != ''
      - name: Compile classes
        if: always() && steps.download.outcome == 'success' && hashFiles('artifacts/results/kotlinova/kotlinova/core/build/jacoco/jvmTest.exec') != ''
        uses: burrunan/gradle-cache-action@663fbad34e03c8f12b27f4999ac46e3d90f87eca # v3.0.1
        with:
          arguments: "compileKotlinJvm compileDebugKotlinAndroid --parallel"
          build-root-directory: repo
          debug: false
          concurrent: true
          read-only: true
      - name: "Copy coverage data from PR"
        if: always() && steps.download.outcome == 'success' && hashFiles('artifacts/results/kotlinova/kotlinova/core/build/jacoco/jvmTest.exec') != ''
        run: |
          shopt -s globstar
          
          mkdir repo/coverage-data
          cp --backup=numbered artifacts/results/kotlinova/kotlinova/**/*.exec repo/coverage-data/
          cd repo/coverage-data
          for file in $(ls -1); do mv "$file" "$file".exec; done
          find .
      - name: "Create jacoco aggregate"
        if: always() && steps.download.outcome == 'success' && hashFiles('artifacts/results/kotlinova/kotlinova/core/build/jacoco/jvmTest.exec') != ''
        run: "./gradlew aggregatedJacocoReport"
        working-directory: repo


      - name: Add coverage to PR
        id: jacoco
        uses: madrapps/jacoco-report@50d3aff4548aa991e6753342d9ba291084e63848
        if: always() && steps.download.outcome == 'success' && hashFiles('artifacts/results/kotlinova/kotlinova/core/build/jacoco/jvmTest.exec') != ''
        with:
          paths: |
            repo/build/reports/jacoco/aggregatedJacocoReport/aggregatedJacocoReport.xml,
          token: ${{ secrets.GITHUB_TOKEN }}
          update-comment: true
          title: Code Coverage
          min-coverage-overall: 50
          min-coverage-changed-files: 30
          pr-number: "${{ steps.pr-meta.outputs.pr_num }}"
      - name: "Upload jacoco coverage report"
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f #v6
        if: always() && steps.download.outcome == 'success' && hashFiles('artifacts/results/kotlinova/kotlinova/core/build/jacoco/jvmTest.exec') != ''
        with:
          name: test-coverage
          path: ${{ github.workspace }}/repo/build/reports/jacoco/aggregatedJacocoReport/html
